<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سوق مول 3 - SOOK MALL</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; text-align: center; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        input, button { width: 90%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; }
        button { background-color: #28a745; color: white; cursor: pointer; border: none; font-weight: bold; }
        button:hover { background-color: #218838; }
        .btn-seller { background-color: #007bff; }
        .hidden { display: none; }
        .product-card { border: 1px solid #ddd; padding: 15px; margin: 10px; background: #fff; border-radius: 8px; }
        .product-card img { max-width: 100%; height: auto; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Welcome to SOOK MALL 3</h1>
    
    <div id="loginSection">
        <h3>تسجيل الدخول</h3>
        <input type="text" id="userName" placeholder="اسمك">
        <input type="text" id="userPhone" placeholder="رقم الموبايل">
        <select id="userRole">
            <option value="buyer">مشتري</option>
            <option value="seller">تاجر</option>
        </select>
        <button onclick="handleLogin()">دخول المول</button>
    </div>

    <div id="sellerSection" class="hidden">
        <h2>لوحة تحكم التاجر</h2>
        <input type="text" id="pName" placeholder="اسم المنتج (مثلاً: تيشرت قطن)">
        <input type="number" id="pPrice" placeholder="السعر">
        <input type="text" id="pImg" placeholder="رابط صورة المنتج (URL)">
        <button class="btn-seller" onclick="uploadProduct()">نشر المنتج في المول</button>
        <button onclick="logout()" style="background:#666">خروج</button>
    </div>

    <div id="buyerSection" class="hidden">
        <h2>المنتجات المعروضة في المول</h2>
        <div id="productsList"></div>
        <button onclick="logout()" style="background:#666">خروج</button>
    </div>
</div>

<script>
    // 1. إعدادات فايربيس الخاصة بمشروعك (SOOK-MALL3)
    const firebaseConfig = {
        apiKey: "AIzaSyB6vS...", // المفاتيح الخاصة بك
        authDomain: "sook-mall3.firebaseapp.com",
        databaseURL: "https://sook-mall3-default-rtdb.firebaseio.com",
        projectId: "sook-mall3",
        storageBucket: "sook-mall3.appspot.com",
        messagingSenderId: "367332308696",
        appId: "1:367332308696:web:0b0432135017df78358e80",
        measurementId: "G-6QJNZ0GFT4"
    };

    // 2. تشغيل المحرك
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let userData = {};

    // 3. وظيفة الدخول
    function handleLogin() {
        const name = document.getElementById('userName').value;
        const phone = document.getElementById('userPhone').value;
        const role = document.getElementById('userRole').value;

        if(name && phone) {
            userData = { name, phone, role };
            document.getElementById('loginSection').classList.add('hidden');
            
            if(role === 'seller') {
                document.getElementById('sellerSection').classList.remove('hidden');
            } else {
                document.getElementById('buyerSection').classList.remove('hidden');
                loadProducts(); // تحميل المنتجات للمشتري
            }
        } else {
            alert("يرجى إدخال البيانات");
        }
    }

    // 4. وظيفة نشر المنتج (للتاجر)
    function uploadProduct() {
        const name = document.getElementById('pName').value;
        const price = document.getElementById('pPrice').value;
        const image = document.getElementById('pImg').value;

        if(name && price && image) {
            database.ref('products').push({
                name: name,
                price: price,
                image: image,
                sellerName: userData.name,
                sellerPhone: userData.phone
            }).then(() => {
                alert("تم نشر المنتج بنجاح في سوق مول!");
                document.getElementById('pName').value = '';
                document.getElementById('pPrice').value = '';
                document.getElementById('pImg').value = '';
            }).catch((error) => {
                alert("خطأ: " + error.message);
            });
        } else {
            alert("يرجى ملء جميع الخانات");
        }
    }

    // 5. وظيفة عرض المنتجات (للمشتري)
    function loadProducts() {
        const productsList = document.getElementById('productsList');
        database.ref('products').on('value', (snapshot) => {
            productsList.innerHTML = '';
            snapshot.forEach((childSnapshot) => {
                const product = childSnapshot.val();
                productsList.innerHTML += `
                    <div class="product-card">
                        <img src="${product.image}" alt="منتج">
                        <h3>${product.name}</h3>
                        <p>السعر: ${product.price} جنيه</p>
                        <p>البائع: ${product.sellerName}</p>
                        <a href="https://wa.me/${product.sellerPhone}" target="_blank">
                            <button style="background:#25D366">تواصل عبر واتساب</button>
                        </a>
                    </div>
                `;
            });
        });
    }

    function logout() {
        location.reload();
    }
</script>

</body>
</html>
