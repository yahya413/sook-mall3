<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سوق مول 3 - SOOK MALL</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; text-align: center; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        h1 { color: #1a73e8; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background-color: #28a745; color: white; border: none; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #218838; opacity: 0.9; }
        .btn-seller { background-color: #007bff; }
        .hidden { display: none; }
        .product-card { background: white; border-radius: 10px; padding: 15px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border: 1px solid #eee; }
        .product-card img { width: 100%; height: 200px; object-fit: contain; border-radius: 8px; }
    </style>
</head>
<body>

<div class="container">
    <h1>SOOK MALL 3 🛒</h1>
    
    <div id="loginSection">
        <h3>تسجيل الدخول</h3>
        <input type="text" id="userName" placeholder="اسمك">
        <input type="text" id="userPhone" placeholder="رقم الموبايل">
        <select id="userRole">
            <option value="buyer">أنا مشتري</option>
            <option value="seller">أنا تاجر</option>
        </select>
        <button onclick="handleLogin()">دخول المول</button>
    </div>

    <div id="sellerSection" class="hidden">
        <h2 style="color: #007bff;">لوحة التاجر</h2>
        <input type="text" id="pName" placeholder="اسم المنتج">
        <input type="number" id="pPrice" placeholder="السعر بالجنيه">
        <input type="text" id="pImg" placeholder="الصق رابط الصورة هنا (Image Address)">
        <button class="btn-seller" onclick="uploadProduct()">نشر المنتج الآن</button>
        <button onclick="logout()" style="background:#dc3545">تسجيل خروج</button>
    </div>

    <div id="buyerSection" class="hidden">
        <h2 style="color: #28a745;">المنتجات المعروضة</h2>
        <div id="productsList"></div>
        <button onclick="logout()" style="background:#dc3545">تسجيل خروج</button>
    </div>
</div>

<script>
    // إعداداتك الحقيقية من الصور اللي بعتها
    const firebaseConfig = {
        apiKey: "AIzaSyB6vS-tFOnx17I6Z2O3jYmP8hC5_N6qJ4",
        authDomain: "sook-mall3.firebaseapp.com",
        databaseURL: "https://sook-mall3-default-rtdb.firebaseio.com",
        projectId: "sook-mall3",
        storageBucket: "sook-mall3.appspot.com",
        messagingSenderId: "367332308696",
        appId: "1:367332308696:web:0b0432135017df78358e80",
        measurementId: "G-6QJNZ0GFT4"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    let userData = {};

    function handleLogin() {
        const name = document.getElementById('userName').value;
        const phone = document.getElementById('userPhone').value;
        const role = document.getElementById('userRole').value;

        if(name && phone) {
            userData = { name, phone, role };
            document.getElementById('loginSection').classList.add('hidden');
            if(role === 'seller') {
                document.getElementById('sellerSection').classList.remove('hidden');
            } else {
                document.getElementById('buyerSection').classList.remove('hidden');
                loadProducts();
            }
        } else {
            alert("اكتب اسمك ورقمك يا بطل!");
        }
    }

    function uploadProduct() {
        const name = document.getElementById('pName').value;
        const price = document.getElementById('pPrice').value;
        const image = document.getElementById('pImg').value;

        if(name && price && image) {
            database.ref('products').push({
                name: name,
                price: price,
                image: image,
                sellerName: userData.name,
                sellerPhone: userData.phone
            }).then(() => {
                alert("مبروك! المنتج نزل في المول 🎉");
                document.getElementById('pName').value = '';
                document.getElementById('pPrice').value = '';
                document.getElementById('pImg').value = '';
            }).catch((err) => {
                alert("حصل خطأ: " + err.message);
            });
        } else {
            alert("املأ كل الخانات الأول!");
        }
    }

    function loadProducts() {
        const list = document.getElementById('productsList');
        database.ref('products').on('value', (snapshot) => {
            list.innerHTML = '';
            snapshot.forEach((child) => {
                const p = child.val();
                list.innerHTML += `
                    <div class="product-card">
                        <img src="${p.image}" onerror="this.src='https://via.placeholder.com/150?text=No+Image'">
                        <h3>${p.name}</h3>
                        <p>السعر: <b>${p.price} جنيه</b></p>
                        <p>البائع: ${p.sellerName}</p>
                        <button onclick="window.open('https://wa.me/${p.sellerPhone}')" style="background:#25d366">واتساب</button>
                    </div>`;
            });
        });
    }

    function logout() { location.reload(); }
</script>
</body>
</html>
